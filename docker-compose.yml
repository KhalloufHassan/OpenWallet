name: openwallet

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=openwallet;Username=openwallet;Password=openwallet
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: openwallet
      POSTGRES_USER: openwallet
      POSTGRES_PASSWORD: openwallet
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwallet"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
